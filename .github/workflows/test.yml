name: Test and Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          version: latest
          cache: true

      - name: Run Unit Tests
        run: |
          cd testdata/loglint 
          go mod download
          cd ../..
          go test

      - name: Install golangci-lint binary
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Build Custom Linter
        run: golangci-lint custom -v