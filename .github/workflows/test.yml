name: Test and Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          version: "1.25.6"
          cache: false

      - name: Run Unit Tests
        run: |
          cd testdata/loglint 
          go mod download
          cd ../..
          go test

      - name: Install golangci-lint binary
        run: curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.10.1

      - name: Build Custom Linter
        run: golangci-lint custom -v